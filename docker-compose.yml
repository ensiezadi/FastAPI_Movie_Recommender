services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movie_recommender}
      POSTGRES_USER: ${POSTGRES_USER:-recommender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recommender}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-recommender} -d $${POSTGRES_DB:-movie_recommender}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://recommender:recommender@postgres:5432/movie_recommender}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_DIR: /models
    volumes:
      - ./models:/models
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_URL: ${API_URL:-http://backend:8000}
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    profiles: ["edge"]

  trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://recommender:recommender@postgres:5432/movie_recommender}
      MODEL_DIR: /models
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["training"]

  evaluator:
    build:
      context: .
      dockerfile: evaluator/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://recommender:recommender@postgres:5432/movie_recommender}
      RESULTS_DIR: /app/results
    volumes:
      - ./evaluator/results:/app/results
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["experiments"]

  spark-master:
    build:
      context: .
      dockerfile: spark/Dockerfile
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8081:8080"
    profiles: ["spark"]

  spark-worker:
    build:
      context: .
      dockerfile: spark/Dockerfile
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master
    profiles: ["spark"]

  spark-job:
    build:
      context: .
      dockerfile: spark/Dockerfile
    volumes:
      - ./data:/data
      - ./models:/models
      - ./evaluator/results:/app/results
    depends_on:
      - spark-master
    profiles: ["spark"]
    command: ["sleep", "infinity"]

volumes:
  postgres_data:
